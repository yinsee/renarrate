<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RE-NARRATE | AI Video Narration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #fb923c;
    --primary-hover: #ea580c;
    --secondary: #6366f1;
    --bg: #f8fafc;
    --surface: rgba(255, 255, 255, 0.8);
    --text-main: #0f172a;
    --text-muted: #64748b;
    --radius-lg: 24px;
    --radius-md: 12px;
    --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text-main);
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 60px;
  }

  .logo-icon {
    width: 48px;
    height: 48px;
    filter: drop-shadow(0 4px 6px rgba(251, 146, 60, 0.2));
  }

  .logo-text {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.05em;
    color: var(--text-main);
  }

  .logo-text span { color: var(--primary); }

  .hero {
    text-align: center;
    margin-bottom: 48px;
  }

  h1 {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin: 0 0 16px 0;
    line-height: 1.1;
  }

  .subtitle {
    font-size: 18px;
    color: var(--text-muted);
    margin: 0;
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  form.disabled { opacity: 0.5; pointer-events: none; }

  .card {
    background: var(--surface);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: var(--radius-lg);
    padding: 32px;
    box-shadow: var(--shadow);
  }

  .drop-zone {
    border: 2px dashed #e2e8f0;
    border-radius: var(--radius-lg);
    padding: 60px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    background: #fff;
    display: block;
  }

  .drop-zone:hover, .drop-zone.active {
    border-color: var(--primary);
    background: rgba(251, 146, 60, 0.02);
  }

  .drop-zone p { color: var(--text-muted); font-weight: 500; margin: 0; }
  .drop-zone p span { color: var(--primary); font-weight: 600; }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  label { font-size: 14px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

  select, textarea {
    background: #fff;
    color: var(--text-main);
    border: 1px solid #e2e8f0;
    border-radius: var(--radius-md);
    padding: 12px 16px;
    font-size: 16px;
    font-family: inherit;
    width: 100%;
    transition: border-color 0.2s;
  }

  select:focus, textarea:focus {
    outline: none;
    border-color: var(--primary);
  }

  textarea { min-height: 100px; resize: vertical; }

  details {
    border: 1px solid #e2e8f0;
    border-radius: var(--radius-md);
    padding: 16px;
    background: #fff;
  }

  details[open] {
    padding-bottom: 20px;
  }

  details summary {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    cursor: pointer;
    list-style: none;
  }

  details summary::before {
    content: '\25B6';
    display: inline-block;
    margin-right: 8px;
    font-size: 10px;
    transition: transform 0.2s;
  }

  details[open] summary::before {
    transform: rotate(90deg);
  }

  details summary::-webkit-details-marker { display: none; }

  .variant-row {
    display: flex;
    gap: 12px;
  }

  .variant-row select { flex: 1; }
  .variant-row button, .variant-row .download-btn { white-space: nowrap; }

  button, .download-btn {
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    padding: 14px 24px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    text-decoration: none;
  }

  button:hover, .download-btn:hover {
    background: var(--primary-hover);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(251, 146, 60, 0.2);
  }

  button.secondary {
    background: #fff;
    color: var(--text-main);
    border: 1px solid #e2e8f0;
  }

  button.secondary:hover {
    background: #f1f5f9;
    box-shadow: none;
    transform: none;
  }

  button:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

  #previewAudio {
    width: 100%;
    margin-top: 16px;
    display: none;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #log {
    background: #0f172a;
    border-radius: var(--radius-md);
    padding: 20px;
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 1.6;
    max-height: 300px;
    overflow-y: auto;
    white-space: pre-wrap;
    margin: 32px 0 0 0;
    color: #cbd5e1;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  #log .err { color: #f87171; }

  #download {
    background: #10b981;
  }

  #download:hover {
    background: #059669;
    box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
  }

  @media (max-width: 640px) {
    h1 { font-size: 32px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <svg viewBox="0 0 100 100" class="logo-icon">
      <path d="M20 20C20 10 90 10 90 45C90 80 50 80 40 90C40 80 20 80 20 45V20Z" fill="#ffedd5" stroke="#fb923c" stroke-width="4"/>
      <path d="M45 35L65 45L45 55V35Z" fill="#fb923c"/>
    </svg>
    <div class="logo-text">RE-<span>NARRATE</span></div>
  </header>

  <div class="hero">
    <h1>Give your video a new voice.</h1>
    <p class="subtitle">Seamlessly rewrite and narrate your screen recordings with AI.</p>
  </div>

  <div class="card">
    <form id="form">
      <label class="drop-zone" id="dropZone" aria-label="Upload video file" role="button" tabindex="0">
        <input type="file" id="file" accept="video/*" hidden>
        <p id="fileNameDisplay">Drop your video here or <span>browse files</span></p>
      </label>

      <div class="form-group">
        <label>Narrator variant</label>
        <div class="variant-row">
          <select id="variant"></select>
          <select id="outputLanguage" style="max-width:160px"></select>
          <button type="submit" id="submitBtn">Start Rendering</button>
          <a id="download" class="download-btn" href="#" target="_blank" style="display:none">View Rendered Video</a>
        </div>
        <label style="display:flex;align-items:center;gap:8px;margin-top:12px;text-transform:none;letter-spacing:0;font-weight:500;color:var(--text-main);cursor:pointer">
          <input type="checkbox" id="explain">
          Explain video (describe frames with vision LLM instead of transcribing audio)
        </label>
        <div id="explainOpts" style="display:none;margin-left:24px;margin-top:6px;display:flex;gap:16px;align-items:center;font-size:13px;color:var(--text-muted)">
          <label style="display:flex;align-items:center;gap:6px;text-transform:none;letter-spacing:0;font-weight:500;color:var(--text-muted)">
            Frame interval (s)
            <input type="number" id="explainInterval" min="0.5" max="30" step="0.5" value="2" style="width:80px;padding:6px 8px;font-size:13px;border:1px solid #e2e8f0;border-radius:8px;background:#fff;color:var(--text-main)">
          </label>
          <label style="display:flex;align-items:center;gap:6px;text-transform:none;letter-spacing:0;font-weight:500;color:var(--text-muted)">
            Max frames
            <input type="number" id="explainMaxFrames" min="4" max="256" step="1" value="64" style="width:80px;padding:6px 8px;font-size:13px;border:1px solid #e2e8f0;border-radius:8px;background:#fff;color:var(--text-main)">
          </label>
        </div>
        <label style="display:flex;align-items:center;gap:8px;margin-top:8px;text-transform:none;letter-spacing:0;font-weight:500;color:var(--text-main);cursor:pointer">
          <input type="checkbox" id="slowVideo">
          Slow down video to match narration (instead of freezing last frame)
        </label>
      </div>

      <details id="previewSection">
        <summary>Preview voice</summary>
        <div class="form-group" style="margin-top:16px">
          <label>Preview text</label>
          <textarea id="previewText" placeholder="Type a sentence or two to hear how the selected narrator reads it." maxlength="500">a quick brown fox jumps over the lazy dog</textarea>
        </div>
        <div style="margin-top:16px">
          <button type="button" id="generatePreviewBtn">Generate Preview</button>
        </div>
        <audio id="previewAudio" controls></audio>
      </details>
    </form>
  </div>

  <pre id="log"></pre>
</div>
<script>
const form = document.getElementById('form');
const fileInput = document.getElementById('file');
const variantSel = document.getElementById('variant');
const languageSel = document.getElementById('outputLanguage');
const explainChk = document.getElementById('explain');
const explainOpts = document.getElementById('explainOpts');
const explainIntervalInput = document.getElementById('explainInterval');
const explainMaxFramesInput = document.getElementById('explainMaxFrames');
const slowVideoChk = document.getElementById('slowVideo');
function syncExplainOpts(){ explainOpts.style.display = explainChk.checked ? 'flex' : 'none'; }
syncExplainOpts();
const log = document.getElementById('log');
const download = document.getElementById('download');
const submitBtn = document.getElementById('submitBtn');
const previewText = document.getElementById('previewText');
const generatePreviewBtn = document.getElementById('generatePreviewBtn');
const previewAudio = document.getElementById('previewAudio');
const dropZone = document.getElementById('dropZone');
const fileNameDisplay = document.getElementById('fileNameDisplay');
let previewBlobUrl = null;

// Drag & Drop handlers
dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropZone.classList.add('active');
});

dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('active');
});

dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('active');
  if (e.dataTransfer.files.length) {
    fileInput.files = e.dataTransfer.files;
    updateFileName(e.dataTransfer.files[0].name);
  }
});

fileInput.addEventListener('change', () => {
  if (fileInput.files.length) {
    updateFileName(fileInput.files[0].name);
  }
});

function updateFileName(name) {
  fileNameDisplay.innerHTML = `Selected: <span>${name}</span>`;
}

function append(line, isErr){
  const span = document.createElement('span');
  if(isErr) span.className = 'err';
  span.textContent = line + '\n';
  log.appendChild(span);
  log.scrollTop = log.scrollHeight;
}

fetch('/variants').then(r=>r.json()).then(d=>{
  for(const v of d.variants){
    const o = document.createElement('option');
    o.value = v; o.textContent = v;
    variantSel.appendChild(o);
  }
  if(d.variants.includes('natgeo')) variantSel.value = 'natgeo';
}).catch(e=>append('[init] failed to load variants: '+e, true));

fetch('/languages').then(r=>r.json()).then(d=>{
  for(const l of d.languages){
    const o = document.createElement('option');
    o.value = l.code; o.textContent = l.name;
    languageSel.appendChild(o);
  }
  languageSel.value = d.default || 'en';
}).catch(e=>append('[init] failed to load languages: '+e, true));

variantSel.addEventListener('change', ()=>{ download.style.display = 'none'; });
languageSel.addEventListener('change', ()=>{ download.style.display = 'none'; });
explainChk.addEventListener('change', ()=>{ download.style.display = 'none'; syncExplainOpts(); });
slowVideoChk.addEventListener('change', ()=>{ download.style.display = 'none'; });

generatePreviewBtn.addEventListener('click', async ()=>{
  const text = previewText.value.trim();
  if(!text){ alert('Type some text first.'); return; }
  const originalLabel = generatePreviewBtn.textContent;
  generatePreviewBtn.disabled = true;
  generatePreviewBtn.textContent = 'Generating…';
  try{
    const res = await fetch('/preview', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({variant: variantSel.value, outputLanguage: languageSel.value, text}),
    });
    if(!res.ok){
      const err = await res.json().catch(()=>({error: res.statusText}));
      append('[preview] '+(err.error || 'failed'), true);
      return;
    }
    const rewritten = res.headers.get('X-Rewritten-Text');
    if(rewritten) append('[preview] '+decodeURIComponent(rewritten));
    const blob = await res.blob();
    if(previewBlobUrl) URL.revokeObjectURL(previewBlobUrl);
    previewBlobUrl = URL.createObjectURL(blob);
    previewAudio.src = previewBlobUrl;
    previewAudio.style.display = 'block';
    try{ await previewAudio.play(); }catch{}
  }catch(e){
    append('[preview] '+e.message, true);
  }finally{
    generatePreviewBtn.disabled = false;
    generatePreviewBtn.textContent = originalLabel;
  }
});

form.addEventListener('submit', e=>{
  e.preventDefault();
  if(!fileInput.files.length){ alert('Please choose a video file first.'); return; }
  form.classList.add('disabled');
  log.textContent = '';
  download.style.display = 'none';
  submitBtn.style.display = '';
  const fd = new FormData();
  fd.append('file', fileInput.files[0]);
  fd.append('variant', variantSel.value);
  fd.append('outputLanguage', languageSel.value);
  fd.append('explain', explainChk.checked ? '1' : '0');
  fd.append('explainInterval', explainIntervalInput.value || '2');
  fd.append('explainMaxFrames', explainMaxFramesInput.value || '64');
  fd.append('slowVideo', slowVideoChk.checked ? '1' : '0');
  fetch('/jobs', {method:'POST', body:fd}).then(r=>r.json()).then(({jobId})=>{
    append('[job] started '+jobId);
    const es = new EventSource('/jobs/'+jobId+'/events');
    es.onmessage = ev=>{
      let data; try{ data = JSON.parse(ev.data); }catch{ append(ev.data); return; }
      const line = '['+data.stage+'] '+(data.message||'');
      append(line, data.stage==='error');
      if(data.stage==='done'){
        append('[done] render complete');
        if(data.outputUrl){
          download.href = data.outputUrl;
          download.style.display = '';
        }
        es.close();
        form.classList.remove('disabled');
      } else if(data.stage==='error'){
        es.close();
        form.classList.remove('disabled');
      }
    };
    es.onerror = ()=>{
      append('[connection lost]', true);
      es.close();
      form.classList.remove('disabled');
    };
  }).catch(e=>{
    append('[upload] failed: '+e, true);
    form.classList.remove('disabled');
  });
});
</script>
</body>
</html>
