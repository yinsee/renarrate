services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./out:/app/out
      - ./models/voices:/app/models/voices:ro
      - ./uploads:/app/uploads
    environment:
      LLM_URL: http://ollama:11434/v1
      LLM_MODEL: gemma3:4b
      WHISPER_MODEL: small.en
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
